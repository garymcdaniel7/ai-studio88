name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv pip install --system ruff black mypy
        working-directory: backend

      - name: Run Ruff
        run: ruff check backend/
        
      - name: Check Black formatting
        run: black --check backend/

  # ── Security ──────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install security tools
        run: uv pip install --system pip-audit bandit

      - name: Run pip-audit (dependency vulnerabilities)
        run: pip-audit -r backend/pyproject.toml --format=json
        continue-on-error: true

      - name: Run Bandit (code security)
        run: bandit -r backend/app/ -c backend/pyproject.toml -f json
        continue-on-error: true

  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: uv venv .venv --python python${{ matrix.python-version }}
        working-directory: backend

      - name: Install dependencies
        run: uv pip install -e ".[dev]"
        working-directory: backend

      - name: Run tests
        env:
          APP_ENV: development
          SECRET_KEY: "ci-test-secret-key-minimum-32-chars-long"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder"
          SUPABASE_JWT_SECRET: "placeholder-jwt-secret"
          REDIS_URL: "redis://localhost:6379/0"
          B2_KEY_ID: "placeholder"
          B2_APPLICATION_KEY: "placeholder"
          B2_BUCKET_NAME: "placeholder"
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=app --cov-report=xml -m "unit"
        working-directory: backend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./infrastructure/docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ai-studio-api:${{ github.sha }}
