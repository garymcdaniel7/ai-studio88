version: "3.9"

# =============================================================================
# AI Studio - Docker Compose (local development)
# =============================================================================
# Start everything:  docker compose up -d
# Start specific:    docker compose up -d api redis
# Logs:              docker compose logs -f api
# Stop:              docker compose down
# Reset:             docker compose down -v
# =============================================================================

services:

  # ── FastAPI Application ─────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.api
    container_name: ai-studio-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - VASTAI_API_KEY=${VASTAI_API_KEY}
    volumes:
      - ./backend:/app
      - ./workflows:/app/workflows:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-studio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.api
    container_name: ai-studio-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME}
      - VASTAI_API_KEY=${VASTAI_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-studio

  # ── Celery Beat (task scheduler) ─────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.api
    container_name: ai-studio-beat
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-studio

  # ── Flower (Celery monitoring) ───────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.api
    container_name: ai-studio-flower
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - ai-studio

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ai-studio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - ai-studio
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-studio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - ai-studio


# =============================================================================
volumes:
  redis_data:
    driver: local

networks:
  ai-studio:
    driver: bridge
